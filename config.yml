repositories:
- url: https://github.com/agama-project/agama/
  type: git
  name: agama

- url: https://github.com/agama-project/integration-tests/
  type: git
  name: agama-integration-tests

- url: https://download.suse.de/ibs/SUSE:/SLFO:/Products:/SLES:/16.1:/TEST/product/iso/
  internal: true
  type: mirrorcache
  name: sles-16.1-test-iso
  files:
    - SLES-16.1-Online-x86_64-*.iso

- url: https://download.opensuse.org/repositories/systemsmanagement:/Agama:/Release/images/iso/
  type: mirrorcache
  name: obs-sm-A-Release-iso
  files:
    - agama-installer.x86_64-*-Build*.iso

- url: https://download.opensuse.org/repositories/systemsmanagement:/Agama:/Devel/images/iso/
  type: mirrorcache
  name: obs-sm-A-Devel-iso
  files:
    - agama-installer.x86_64-*-Build*.iso

- url: https://build.opensuse.org/project/show/systemsmanagement:Agama:Devel
  type: obs
  name: obs-sm-A-Devel

- url: https://build.opensuse.org/project/show/systemsmanagement:Agama:Release
  type: obs
  name: obs-sm-A-Release

- url: https://build.opensuse.org/project/show/openSUSE:Factory
  type: obs
  name: obs-factory
  submit_requests: true

- url: https://src.suse.de/pool/
  type: gitea
  branch: slfo-main
  name: ibs-pool

- url: https://src.suse.de/pool/
  type: gitea
  branch: slfo-1.2
  name: ibs-pool-slfo1.2

# maps from obs package to binary rpms (wildcards)
binary_patterns_by_source:
  agama-web-ui:
  - agama-web-ui
  agama:
  - agama
  - agama-common
  - agama-autoinstall
  - agama-cli
  - agama-cli-bash-completion
  rubygem-agama-yast:
  - ruby*-rubygem-agama-yast
  # agama-yast source rpm, but same OBS package
  - agama-yast
  agama-products:
  - agama-products*
  agama-integration-tests:
  - agama-integration-tests

# Maps obs package to a list of RPM spec files.
# If not specified, foo maps to a singleton [foo].
spec_names_by_package:
  rubygem-agama-yast:
  - rubygem-agama-yast
  - agama-yast
